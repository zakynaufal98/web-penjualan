<svg width="520" height="480" viewBox="0 0 520 480" xmlns="http://www.w3.org/2000/svg">
  <title>Bakery Business Management Illustration</title>
  <desc>A modern illustration featuring a dashboard overlaying stylized cookies and pastries for a bakery management app.</desc>
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#0D0920" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.1" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.05" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="520" height="480" fill="#0D0920" />
  <circle cx="260" cy="240" r="300" fill="url(#bgGlow)" />

  <!-- Stylized Pastries Group -->
  <g transform="translate(80, 260)">
    <!-- Cookie 1 -->
    <circle cx="60" cy="80" r="55" fill="#e879f9" opacity="0.9" />
    <path d="M45 60L47 60 M75 70L77 70 M55 95L57 95 M80 100L82 100" stroke="#0D0920" stroke-width="6" stroke-linecap="round" />
    
    <!-- Donut -->
    <circle cx="160" cy="110" r="45" fill="#a78bfa" />
    <circle cx="160" cy="110" r="15" fill="#0D0920" />
    
    <!-- Small Pastry -->
    <rect x="230" y="70" width="70" height="50" rx="15" fill="#e879f9" opacity="0.7" />
  </g>

  <!-- Dashboard Management Card -->
  <g transform="translate(240, 80)">
    <rect width="220" height="160" rx="20" fill="url(#cardGrad)" stroke="#ffffff" stroke-opacity="0.2" />
    <text x="25" y="40" font-family="sans-serif" font-size="16" font-weight="bold" fill="#e879f9">Revenue</text>
    <text x="25" y="75" font-family="sans-serif" font-size="32" font-weight="bold" fill="#ffffff">$2,480</text>
    <text x="145" y="40" font-family="sans-serif" font-size="12" fill="#a78bfa">+24.5%</text>
    
    <!-- Sparkline -->
    <path d="M25 130 L60 110 L100 125 L140 90 L195 105" fill="none" stroke="#a78bfa" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" />
    <circle cx="195" cy="105" r="4" fill="#e879f9" />
  </g>

  <!-- Decorative Accents -->
  <g>
    <!-- Sparkle 1 -->
    <path d="M120 120 L125 100 L130 120 L150 125 L130 130 L125 150 L120 130 L100 125 Z" fill="#ffffff" opacity="0.6" />
    <!-- Floating Dots/Stars -->
    <circle cx="450" cy="350" r="6" fill="#a78bfa" />
    <circle cx="470" cy="320" r="3" fill="#e879f9" />
    <circle cx="60" cy="200" r="4" fill="#ffffff" opacity="0.4" />
    <!-- Secondary Dashboard Element -->
    <rect x="360" y="280" width="100" height="12" rx="6" fill="#a78bfa" opacity="0.3" />
    <rect x="360" y="305" width="60" height="12" rx="6" fill="#e879f9" opacity="0.3" />
  </g>
</svg>